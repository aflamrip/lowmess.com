media:
  input: public/uploads
  output: /uploads

content:
  - name: videos
    label: "الفيديوهات"
    type: collection
    path: src/content/videos

    fields:
      - name: draft
        label: "حالة"
        type: boolean
        default: false

      - name: title
        label: "العنوان"
        type: string

      - name: type
        label: "النوع"
        type: select
        options:
          movie: "Movie"
          series: "Series"
          episode: "Episode"
          anime: "Anime"

      - name: main_category
        label: "القسم الرئيسي"
        type: select
        options:
          "أفلام": "أفلام"
          "مسلسلات": "مسلسلات"
          "انمى": "انمى"

      - name: subcategory
        label: "القسم الفرعى"
        type: select
        options:
          "افلام-عربية": "أفلام عربية"
          "افلام-اجنبية": "أفلام اجنبية"
          "مسلسلات-عربية": "مسلسلات عربية"
          "مسلسلات-اجنبية": "مسلسلات اجنبية"
          "": "لا يوجد"

      - name: description
        label: "وصف قصير"
        type: string

      - name: body
        label: "وصف طويل"
        type: string

      - name: images
        label: "الصور"
        type: object
        fields:
          thumb:
            label: "الصورة المصغرة"
            type: media
          poster:
            label: "صورة الغلاف"
            type: media

      - name: tags
        label: "الكلمات الدلالية"
        type: array
        itemType: string

      - name: meta_keywords
        label: "Meta keywords"
        type: string

      - name: video
        label: "الفيديو"
        type: object
        fields:
          source_type:
            label: "نوع المصدر"
            type: select
            options:
              mp4: "MP4"
              embed: "Embed"
          source:
            label: "الرابط"
            type: string
          content_url_allowed:
            label: "مفتوح التحميل"
            type: boolean

      - name: series
        label: "معلومات المسلسل"
        type: object
        fields:
          title:
            label: "اسم المسلسل"
            type: string
          season:
            label: "الموسم"
            type: number
          episode:
            label: "الحلقة"
            type: number

      - name: release_date
        label: "تاريخ الإصدار"
        type: string

      - name: duration
        label: "المدة"
        type: string

      - name: rating
        label: "التقييم"
        type: number

      - name: external
        label: "المراجع الخارجية"
        type: object
        fields:
          imdb_id:
            label: "IMDB ID"
            type: string
          youtube_id:
            label: "YouTube ID"
            type: string
