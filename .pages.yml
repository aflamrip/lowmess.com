media:
  input: public/uploads
  output: /uploads

content:
  - name: videos
    label: "الفيديوهات"
    type: collection
    path: src/content/videos
    slug: "{{slug}}"
    identifier_field: title
    create: true
    fields:
      - name: draft
        label: "حالة"
        type: boolean
        default: false

      - name: title
        label: "العنوان"
        type: string
        required: true

      - name: slug
        label: "الرابط (slug)"
        type: string
        required: true
        hint: "مثال: افلام-عربية-علاء-الدين"

      - name: type
        label: "النوع"
        type: select
        options:
          - movie
          - series
          - episode
          - anime
        required: true

      - name: main_category
        label: "القسم الرئيسي"
        type: select
        options:
          - "أفلام"
          - "مسلسلات"
          - "انمى"
        required: true

      - name: subcategory
        label: "القسم الفرعى"
        type: select
        options:
          - label: "أفلام عربية"
            value: "افلام-عربية"
          - label: "أفلام اجنبية"
            value: "افلام-اجنبية"
          - label: "مسلسلات عربية"
            value: "مسلسلات-عربية"
          - label: "مسلسلات اجنبية"
            value: "مسلسلات-اجنبية"
          - label: "لا يوجد"
            value: ""
        hint: "اختر القسم الفرعى إن وُجد. الانمى لا يحتاج قسم فرعى."

      - name: description
        label: "وصف قصير"
        type: string

      - name: body
        label: "وصف طويل"
        type: markdown
        required: false

      - name: images
        label: "الصور"
        type: object
        fields:
          - name: thumb
            label: "الصورة المصغرة (thumb)"
            type: image
            required: false
          - name: poster
            label: "صورة الغلاف (poster)"
            type: image
            required: false

      - name: tags
        label: "الكلمات الدلالية (tags)"
        type: list
        field:
          name: tag
          label: "tag"
          type: string

      - name: meta_keywords
        label: "Meta keywords"
        type: string
        hint: "يمكن فصل الكلمات بفواصل"

      - name: video
        label: "الفيديو"
        type: object
        fields:
          - name: source_type
            label: "نوع المصدر"
            type: select
            options:
              - mp4
              - embed
            default: mp4

          - name: source
            label: "المصدر (رابط MP4 أو رابط embed)"
            type: string
            required: true

          - name: content_url_allowed
            label: "مفتوح التحميل (contentUrl)"
            type: boolean
            default: false
            hint: "ضع true إن الملف متاح للتحميل أو بث مباشر"

      - name: series
        label: "معلومات المسلسل (إن كانت الحلقة جزءًا من مسلسل)"
        type: object
        required: false
        fields:
          - name: title
            label: "اسم المسلسل"
            type: string
          - name: season
            label: "الموسم (رقم)"
            type: number
          - name: episode
            label: "الحلقة (رقم)"
            type: number

      - name: release_date
        label: "تاريخ الإصدار"
        type: datetime

      - name: duration
        label: "المدة (HH:MM:SS)"
        type: string

      - name: rating
        label: "التقيم (rating)"
        type: number
        hint: "مثال: 7.8"

      - name: external
        label: "المراجع الخارجية (imdb, youtube id...)"
        type: object
        fields:
          - name: imdb_id
            label: "imdb_id"
            type: string
          - name: youtube_id
            label: "youtube_id"
            type: string